services:
  - type: web
    name: pithi-digital-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGIN
        value: https://pithi-digital-v1.vercel.app
      - key: APP_NAME
        value: Pithi Digital
      - key: APP_VERSION
        value: 1.0.0
